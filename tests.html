<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Cue App Tests</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f5f7fb;
      color: #1f2937;
    }

    #results {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #dbe3f0;
      border-radius: 10px;
      padding: 1rem;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .hidden-app {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>Color Cue App Test Runner</h1>
  <div id="results">Running tests...</div>

  <main class="hidden-app">
    <form id="config-form">
      <fieldset id="colors-fieldset">
        <label><input type="checkbox" name="color" value="red"> Red</label>
        <label><input type="checkbox" name="color" value="blue"> Blue</label>
        <label><input type="checkbox" name="color" value="yellow"> Yellow</label>
        <label><input type="checkbox" name="color" value="green"> Green</label>
        <label><input type="checkbox" name="color" value="orange"> Orange</label>
        <label><input type="checkbox" name="color" value="pink"> Pink</label>
        <label><input type="checkbox" name="color" value="cyan"> Cyan</label>
        <label><input type="checkbox" name="color" value="purple"> Purple</label>
        <label><input type="checkbox" name="color" value="black"> Black</label>
        <label><input type="checkbox" name="color" value="brown"> Brown</label>
        <label><input type="checkbox" name="color" value="white"> White</label>
      </fieldset>

      <label for="hz-input">Frequency (Hz, 0.5 to 2): <span id="hz-value">1.0</span></label>
      <input id="hz-input" type="range" step="0.1" min="0.5" max="2" value="1">

      <label for="seconds-input">Duration (seconds, 10 to 60): <span id="seconds-value">30</span></label>
      <input id="seconds-input" type="range" step="1" min="10" max="60" value="30">

      <label for="seed-input">Seed (optional)</label>
      <input id="seed-input" type="text" autocomplete="off">

      <div id="error-message"></div>

      <button id="start-button" type="button">Start</button>
      <button id="stop-button" type="button">Stop</button>
      <button id="copy-link-button" type="button">Copy Share Link</button>
    </form>

    <section id="status-panel">
      <p>Status: <span id="status-text">Ready</span></p>
      <p>Current cue: <span id="current-cue">None</span></p>
      <p>Elapsed: <span id="elapsed-text">0.0</span>s</p>
      <p>Remaining: <span id="remaining-text">0.0</span>s</p>
    </section>
  </main>

  <script>
    window.__COLOR_CUE_TEST__ = true;
  </script>
  <script src="app.js"></script>
  <script src="tests.js"></script>
</body>
</html>
